name: ingest

# Non-CF egress (AniList blocks Cloudflare Worker IPs). Pulls AniList, writes
# only the changed files to R2 (delta). Read path stays R2-only.
on:
  schedule:
    - cron: '0 */6 * * *' # every 6h
  workflow_dispatch: {}

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install aws4fetch --no-save
      - run: node ingest/push-r2.mjs
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: watchdex-data
          PAGES: '3'
