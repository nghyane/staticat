# staticat cache policy — deployable (dịch sang Cloudflare Cache Rules / Terraform)
# Producer set Cache-Control lúc PutObject; Cache Rules override theo path nếu cần.
version: v1

policies:
  pointer:   { max_age: 30,       stale_while_revalidate: 300,  stale_if_error: 86400 }   # tươi
  popular:   { max_age: 300,      stale_while_revalidate: 3600 }
  immutable: { max_age: 31536000, immutable: true }                                       # 1 năm

# Match từ trên xuống, rule đầu khớp thắng.
rules:
  - match: "/v1/title/*/head.json"        policy: pointer
  - match: "/v1/feed/latest/0.json"       policy: pointer
  - match: "/v1/search/head.json"         policy: pointer
  - match: "/v1/feed/popular/*"           policy: popular
  - match: "/v1/**/*.v*.json"             policy: immutable    # meta.v{rev}, parts/*.v{n}, index.v{N}
  - match: "/v1/part/*"                   policy: immutable
  - match: "/v1/genre/**"                 policy: immutable
  - match: "/v1/feed/latest/*"            policy: immutable    # trang ≥1 (sau pointer rule trên)
  - match: "blob:image|video|hls-segment" policy: immutable    # qua proxy: range-object cache (206→200)

edge:
  tiered_cache: true            # bật để giảm cold-miss giữa các PoP
  cache_reserve: "cân nhắc nếu long-tail nhiều (persistent, có phí)"
  range_object_cache: true      # proxy cache từng byte-range của blob lớn (đã có ở bunle)
