name = "watchdex-ingest"
main = "src/index.ts"
compatibility_date = "2026-06-19"

# Autopilot: every 6 hours pull AniList -> assemble() -> write the /v1 layout to
# R2. Light job (few GraphQL calls + R2 binding puts), fits Worker free limits.
[triggers]
crons = ["0 */6 * * *"]

[vars]
AIRING_PAGES = "3"  # 50/page currently-airing → feed/calendar
POPULAR_PAGES = "4" # 50/page top popular → catalog depth (related resolves)

# The SPA reads this bucket via its custom domain (PUBLIC_DATA_BASE); the worker
# writes /v1/**. Create once:  wrangler r2 bucket create watchdex-data
# Manual run:  curl -H "authorization: Bearer $INGEST_SECRET" https://<worker>/ingest
# Set secret:  wrangler secret put INGEST_SECRET
[[r2_buckets]]
binding = "DATA"
bucket_name = "watchdex-data"
