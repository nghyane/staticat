name = "watchdex-ingest"
main = "src/index.ts"
compatibility_date = "2026-06-19"

# Autopilot: every 2h pull Jikan (MAL — no key, not CF-blocked) -> write /v1 to
# R2 via binding (no S3 key). Fast list keeps schedule fresh; per-entity enrich
# is bounded per run (ENRICH_LIMIT) and progressive, so it fits Worker limits.
[triggers]
crons = ["0 */2 * * *"]

[vars]
AIRING_PAGES = "2"   # seasons/now → schedule/feed
POPULAR_PAGES = "2"  # top/anime → catalog depth (related resolves)
ENRICH_LIMIT = "30"  # per-entity (relations/recs/chars/streaming) calls per run

# SPA reads this bucket (PUBLIC_DATA_BASE); worker writes /v1/** via binding.
# Create once:  wrangler r2 bucket create watchdex-data
# Manual run:   curl https://<worker>/ingest   (or behind INGEST_SECRET)
[[r2_buckets]]
binding = "DATA"
bucket_name = "watchdex-data"
